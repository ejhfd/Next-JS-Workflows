---
name: Next JS Build with Cache And Artifacts
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
      - name: Setup Nods JS
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22.x
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build Next Js App
        run: npm run build
      - name: Upload build on artifacts
        uses: actions/upload-artifact@v4.2.1
        with:
          name: nextjs-build
          path: out/
